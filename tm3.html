<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Modul 3</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #218838;
        }

        #resultArea {
            margin-top: 25px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 5px solid #28a745;
            border-radius: 4px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                width: 90%;
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Form Registrasi</h1>
        <form id="registrationForm">
            <div class="input-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" placeholder="Masukkan nama Anda" required>
            </div>
            <div class="input-group">
                <label for="nim">NIM</label>
                <input type="text" id="nim" placeholder="Masukkan NIM Anda" required>
            </div>
            <button type="submit">Submit Data</button>
        </form>

        <div id="resultArea" class="hidden">
            <h3 style="margin-top:0;">Data Terkirim:</h3>
            <p id="displayNama"></p>
            <p id="displayNim"></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('registrationForm');
            const resultArea = document.getElementById('resultArea');

            form.addEventListener('submit', function(event) {
                event.preventDefault(); 

                const namaValue = document.getElementById('nama').value;
                const nimValue = document.getElementById('nim').value;

                document.getElementById('displayNama').innerHTML = "<strong>Nama:</strong> " + namaValue;
                document.getElementById('displayNim').innerHTML = "<strong>NIM:</strong> " + nimValue;

                resultArea.classList.remove('hidden');
                
                console.log('Data form berhasil diproses!');
            });
        });
    </script>
</body>
</html>

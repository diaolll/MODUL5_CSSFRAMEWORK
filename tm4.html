<!DOCTYPE html>

<html>
<head>
<title>Layout Grid dan Flexbox</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
}

.container{
    display:grid;
    grid-template-areas:
        "header header"
        "main sidebar"
        "footer footer";
    grid-template-columns:3fr 1fr;
    grid-template-rows:auto 1fr auto;
    height:100vh;
}

/* HEADER */
header{
    grid-area:header;
    background:lightblue;
    padding:15px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav a{
    margin-left:10px;
    text-decoration:none;
    color:black;
}

/* MAIN CONTENT */
main{
    grid-area:main;
    background:lightgray;
    padding:20px;
}

/* SIDEBAR */
aside{
    grid-area:sidebar;
    background:lightyellow;
    padding:20px;
}

/* FOOTER */
footer{
    grid-area:footer;
    background:lightgreen;
    text-align:center;
    padding:10px;
}
</style>

</head>

<body>

<div class="container">

<header>
<div class="logo"><b>My Website</b></div>
<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>
</header>

<main>
<h2>Artikel</h2>
<p>Ini untuk konten utamanya.</p>
<p>ini masuk di bagian grid di css nya.</p>
</main>

<aside>
<h3>Sidebar</h3>
<p>bisa di isi link atau yang lain.</p>
</aside>

<footer>
<p>© web tm 4</p>
</footer>

</div>

</body>
</html>
